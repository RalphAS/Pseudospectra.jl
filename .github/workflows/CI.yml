name: CI
on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.plotter }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    env:
      GKS_ENCODING: "utf8"
      GKSwstype: "100"
      JULIA_NUM_THREADS: "2"
      PSPLOTTER: ${{ matrix.plotter }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.6'
          - 'lts'
          - '1'
        os:
          - ubuntu-latest
          # - macOS-latest
          # - windows-latest
        plotter:
          - 'PythonPlot'
          - 'Makie'
          - 'Plots'
          - 'None'
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@latest
      - name: Bump environment
        run: julia -e "mv(\"./test/Project-${{ matrix.plotter }}.toml\",\"./test/Project.toml\", force=true)";
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: ./Pseudospectra/src, ./Pseudospectra/ext
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
